<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임상심리사 2급 랜덤 퀴즈</title>
  <style>
    :root {
      --ink: #1f2937;
      --sub: #6b7280;
      --line: #eadfce;
      --card: rgba(255, 251, 244, 0.92);
      --accent: #9a6700;
      --accent-soft: rgba(255, 242, 191, 0.95);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background:
        linear-gradient(rgba(248, 242, 231, 0.7), rgba(243, 235, 221, 0.76)),
        url("https://upload.wikimedia.org/wikipedia/commons/e/eb/Elements_hello_kitty.jpg") center top / cover fixed;
    }

    .wrap {
      width: min(980px, calc(100% - 24px));
      margin: 22px auto 40px;
    }

    .hero,
    .panel,
    .empty {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 46px rgba(115, 77, 14, 0.1);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 24px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.08;
    }

    .hero p {
      margin: 0;
      color: var(--sub);
      line-height: 1.6;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .badge,
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 13px;
      border-radius: 999px;
      font-weight: 700;
    }

    .badge {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .panel {
      padding: 20px;
      margin-bottom: 16px;
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .chip {
      background: #fff7db;
      border: 1px solid #f6d587;
      color: var(--accent);
    }

    .image-frame {
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: white;
    }

    .image-frame img {
      display: block;
      width: 100%;
      height: auto;
    }

    .controls,
    .sub-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 16px 0;
    }

    .mini-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: #111827;
      color: white;
    }

    .secondary {
      background: #efe3ca;
      color: #5b4636;
    }

    .danger {
      background: #b91c1c;
      color: white;
    }

    .success {
      background: #166534;
      color: white;
    }

    .answer {
      display: none;
      padding-top: 8px;
    }

    .answer.visible {
      display: block;
    }

    .hint {
      margin: 12px 0 0;
      color: var(--sub);
      line-height: 1.6;
      font-size: 14px;
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .list-item-split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .list-link,
    .list-remove,
    .mini-chip {
      padding: 10px 12px;
    }

    .list-link,
    .mini-chip {
      background: #fff7db;
      color: #7c4a05;
      text-align: left;
    }

    .mini-chip {
      min-width: 48px;
      text-align: center;
      border-radius: 999px;
      padding: 8px 10px;
    }

    .list-remove {
      background: #fee2e2;
      color: #991b1b;
      width: auto;
    }

    .empty {
      padding: 28px;
      line-height: 1.7;
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100%, calc(100% - 14px));
        margin: 14px auto 28px;
      }

      .hero,
      .panel,
      .empty {
        border-radius: 20px;
      }

      .hero,
      .panel,
      .empty {
        padding: 16px;
      }

      button {
        width: 100%;
      }

      .list-item-split {
        grid-template-columns: 1fr;
      }

      .list-remove {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>임상심리사 2급 랜덤 퀴즈</h1>
      <p>한 번 나온 문제는 다시 나오지 않고, 총 191문제를 모두 풀면 끝납니다. 지금까지 본 문제는 위쪽 번호 리스트에서 바로 다시 확인할 수 있습니다.</p>
      <div class="stats">
        <div class="badge">총 문항 <span id="total-count">0</span>개</div>
        <div class="badge">푼 문제 <span id="viewed-count">0</span>개</div>
        <div class="badge">오답노트 <span id="wrong-count">0</span>개</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-top">
        <div class="chip">지금까지 푼 문제</div>
        <button class="secondary" id="reset-btn">처음부터 다시</button>
      </div>
      <p class="hint" id="viewed-empty">아직 본 문제가 없습니다.</p>
      <div class="mini-chip-row" id="viewed-list"></div>
    </section>

    <section class="panel" id="quiz-panel" hidden>
      <div class="panel-top">
        <div class="chip" id="card-label"></div>
        <div class="chip" id="progress-label">준비 완료</div>
      </div>

      <div class="sub-controls">
        <button class="secondary" id="wrong-toggle-btn">오답노트 보기</button>
      </div>

      <div class="image-frame">
        <img id="question-image" alt="문제 이미지">
      </div>

      <div class="controls">
        <button class="primary" id="reveal-btn">답 확인하기</button>
        <button class="secondary" id="prev-btn">이전 문제</button>
        <button class="secondary" id="next-btn">다음 문제</button>
      </div>

      <div class="answer" id="answer-box">
        <div class="image-frame">
          <img id="answer-image" alt="정답 이미지">
        </div>
        <div class="controls">
          <button class="success" id="mark-correct-btn">O 정답 처리</button>
          <button class="danger" id="mark-wrong-btn">X 오답노트 저장</button>
        </div>
        <p class="hint" id="save-status"></p>
      </div>

      <p class="hint" id="question-text"></p>
    </section>

    <section class="panel" id="completion-panel" hidden>
      <div class="panel-top">
        <div class="chip">완료</div>
      </div>
      <p class="hint" id="completion-text"></p>
    </section>

    <section class="panel" id="wrong-list-panel" hidden>
      <div class="panel-top">
        <div class="chip">오답노트 리스트</div>
      </div>
      <p class="hint" id="wrong-list-empty">X로 저장한 문제가 아직 없습니다.</p>
      <div class="list" id="wrong-list"></div>
    </section>

    <section class="empty" id="empty-panel" hidden>
      카드 데이터가 없습니다. 먼저 배포용 사이트를 다시 생성해 주세요.
    </section>
  </div>

  <script src="quiz-data.js?v=8"></script>
  <script src="app.js?v=8"></script>
</body>
</html>
