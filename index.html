<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>임상심리사 2급 랜덤 퀴즈</title>
  <style>
    :root {
      --ink: #1f2937;
      --sub: #6b7280;
      --line: #eadfce;
      --card: rgba(255, 253, 248, 0.96);
      --accent: #9a6700;
      --accent-soft: #fff2bf;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.18), transparent 28%),
        linear-gradient(180deg, #f8f2e7 0%, #f3ebdd 100%);
    }

    .wrap {
      width: min(1080px, calc(100% - 28px));
      margin: 32px auto;
    }

    .hero, .panel, .empty {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 46px rgba(115, 77, 14, 0.08);
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.08;
    }

    .hero p {
      margin: 0;
      color: var(--sub);
      line-height: 1.65;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .badge, .chip {
      display: inline-flex;
      align-items: center;
      padding: 9px 14px;
      border-radius: 999px;
      font-weight: 700;
    }

    .badge {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(280px, 0.95fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      padding: 24px;
      margin-bottom: 18px;
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .chip {
      background: #fff7db;
      border: 1px solid #f6d587;
      color: var(--accent);
    }

    .image-frame {
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: white;
    }

    .image-frame img {
      display: block;
      width: 100%;
      height: auto;
    }

    .controls, .sub-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 18px 0;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: #111827;
      color: white;
    }

    .secondary {
      background: #efe3ca;
      color: #5b4636;
    }

    .danger {
      background: #b91c1c;
      color: white;
    }

    .success {
      background: #166534;
      color: white;
    }

    .answer {
      display: none;
      padding-top: 8px;
    }

    .answer.visible {
      display: block;
    }

    .hint {
      margin: 14px 0 0;
      color: var(--sub);
      line-height: 1.6;
      font-size: 14px;
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .list-item {
      display: block;
    }

    .list-item-split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .list-link, .list-remove {
      width: 100%;
      padding: 10px 14px;
    }

    .list-link {
      background: #fff7db;
      color: #7c4a05;
      text-align: left;
    }

    .list-remove {
      background: #fee2e2;
      color: #991b1b;
      width: auto;
    }

    .sidebar-panel {
      position: sticky;
      top: 16px;
    }

    .empty {
      padding: 28px;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar-panel {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100%, calc(100% - 16px));
        margin: 16px auto;
      }

      .hero, .panel, .empty {
        border-radius: 20px;
      }

      .hero, .panel, .empty {
        padding: 18px;
      }

      button {
        width: 100%;
      }

      .list-item-split {
        grid-template-columns: 1fr;
      }

      .list-remove {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>임상심리사 2급 랜덤 퀴즈</h1>
      <p>한 번 나온 문제는 다시 나오지 않고, 총 191문제를 모두 풀면 끝납니다. 지금까지 본 문제는 리스트에 쌓이고, 번호를 눌러 바로 다시 돌아갈 수 있습니다.</p>
      <div class="stats">
        <div class="badge">총 문항 <span id="total-count">0</span>개</div>
        <div class="badge">푼 문제 <span id="viewed-count">0</span>개</div>
        <div class="badge">오답노트 <span id="wrong-count">0</span>개</div>
      </div>
    </section>

    <div class="layout">
      <div>
        <section class="panel" id="quiz-panel" hidden>
          <div class="panel-top">
            <div class="chip" id="card-label"></div>
            <div class="chip" id="progress-label">준비 완료</div>
          </div>

          <div class="sub-controls">
            <button class="secondary" id="all-mode-btn">문제 화면</button>
            <button class="secondary" id="wrong-toggle-btn">오답노트 보기</button>
            <button class="secondary" id="reset-btn">처음부터 다시</button>
          </div>

          <div class="image-frame">
            <img id="question-image" alt="문제 이미지">
          </div>

          <div class="controls">
            <button class="primary" id="reveal-btn">답 확인하기</button>
            <button class="secondary" id="prev-btn">이전 문제</button>
            <button class="secondary" id="next-btn">다음 문제</button>
          </div>

          <div class="answer" id="answer-box">
            <div class="image-frame">
              <img id="answer-image" alt="정답 이미지">
            </div>
            <div class="controls">
              <button class="success" id="mark-correct-btn">O 정답 처리</button>
              <button class="danger" id="mark-wrong-btn">X 오답노트 저장</button>
            </div>
            <p class="hint" id="save-status"></p>
          </div>

          <p class="hint" id="question-text"></p>
        </section>

        <section class="panel" id="completion-panel" hidden>
          <div class="panel-top">
            <div class="chip">완료</div>
          </div>
          <p class="hint" id="completion-text"></p>
        </section>

        <section class="panel" id="wrong-list-panel" hidden>
          <div class="panel-top">
            <div class="chip">오답노트 리스트</div>
          </div>
          <p class="hint" id="wrong-list-empty">X로 저장한 문제가 아직 없습니다.</p>
          <div class="list" id="wrong-list"></div>
        </section>
      </div>

      <div class="sidebar-panel">
        <section class="panel">
          <div class="panel-top">
            <div class="chip">지금까지 본 문제</div>
          </div>
          <p class="hint" id="viewed-empty">아직 본 문제가 없습니다.</p>
          <div class="list" id="viewed-list"></div>
        </section>
      </div>
    </div>

    <section class="empty" id="empty-panel" hidden>
      카드 데이터가 없습니다. 먼저 배포용 사이트를 다시 생성해 주세요.
    </section>
  </div>

  <script src="quiz-data.js?v=6"></script>
  <script src="app.js?v=6"></script>
</body>
</html>
